# LiteLLM routing — clients (vr-dispatch, Open WebUI, scripts) send
# model="brain" | "coder" | "fleet" | "frontier" and never care where it runs.

model_list:
  # api_base vars are full URLs assembled in docker-compose.yaml — LiteLLM
  # resolves os.environ/VAR only as the entire value, never inside a URL.

  # Always-on: Spark A, gpt-oss-120b
  - model_name: brain
    litellm_params:
      model: hosted_vllm/openai/gpt-oss-120b
      api_base: os.environ/BRAIN_API_BASE
      api_key: "local"

  # Always-on: Spark B, Qwen3.6-27B (code + tools + reasoning)
  - model_name: coder
    litellm_params:
      model: hosted_vllm/Qwen/Qwen3.6-27B-FP8
      api_base: os.environ/CODER_API_BASE
      api_key: "local"

  # On-demand cluster lane. UNCOMMENT ONLY after lanes/cluster-dsv4-fleet
  # Gates 0-5 pass. While this lane is up, brain/coder are down (swap-lane.sh)
  # and their fallbacks below carry the traffic.
  # - model_name: fleet
  #   litellm_params:
  #     model: hosted_vllm/deepseek-v4-flash-dspark
  #     api_base: os.environ/FLEET_API_BASE
  #     api_key: "local"

  # Frontier fallback via Claude API. Model strings move — verify current
  # ones at https://docs.claude.com/en/api/overview before changing.
  # anthropic/claude-opus-4-8 is the higher-capability alternative.
  - model_name: frontier
    litellm_params:
      model: anthropic/claude-sonnet-5

litellm_settings:
  # LOAD-BEARING. Client SDKs pass divergent reasoning/sampling params;
  # without drop_params the upstream rejects unknown ones and calls fail
  # in ways that look like model bugs.
  drop_params: true
  num_retries: 1
  request_timeout: 600

router_settings:
  # Local executes; frontier catches what local can't. Keep the dependency
  # one-way: nothing local should be a fallback FOR frontier.
  fallbacks:
    - brain: ["frontier"]
    - coder: ["frontier"]
    # - fleet: ["frontier"]

general_settings: {
  # OFF by default — host networking exposes the gateway to the whole LAN,
  # and anyone on it can spend Anthropic credits via `frontier`. To require
  # Authorization: Bearer <key> from clients, flip all three together:
  # non-empty LITELLM_MASTER_KEY in config/cluster.env, its passthrough in
  # docker-compose.yaml, and the line below. All or none: a live master_key
  # with a missing/empty env value rejects every request.
  # master_key: os.environ/LITELLM_MASTER_KEY
}
